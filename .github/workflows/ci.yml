name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: make install

      - name: Validate specs
        run: make spec-validate

      - name: Check codegen drift
        run: make spec-codegen-check

      - name: Contract checks
        run: make spec-check

      - name: Phase gates
        run: make spec-phase-check

      - name: Run tests
        run: make test

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build dashboard
        working-directory: apps/web
        run: |
          npm ci
          npm run build
