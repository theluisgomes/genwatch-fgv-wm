services:
  - type: web
    name: genwatch-api
    runtime: python
    plan: free
    buildCommand: |
      pip install -r apps/api/requirements.txt
      pip install -r tools/spec-cli/requirements.txt
    startCommand: cd apps/api && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/generations
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GENWATCH_PUBLIC_READ
        value: "true"
      - key: GENWATCH_CORS_ORIGINS
        sync: false
      - key: GENWATCH_ADMIN_KEY
        generateValue: true
